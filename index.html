<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>STICKMAN | MOBILE-MAX v30</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; object-fit: cover; }
        #info { position: absolute; top: 10px; left: 10px; color: #fff; font-family: sans-serif; font-size: 10px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div id="info">MODE: MOBILE_ULTRA_LIGHT // FPS_LOCKED: 30</div>
<canvas id="canvas"></canvas>
<video id="video" style="display:none" playsinline></video>

<script type="module">
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video');
    let results = null;

    // FPS 鎖定邏輯
    let lastTime = 0;
    const interval = 1000 / 30; // 30 FPS

    const getXY = (lm) => lm ? { x: (1 - lm.x) * canvas.width, y: lm.y * canvas.height } : null;

    // 1. 空心圓環頭部 (不遮臉)
    function drawHaloHead(face, nose) {
        if (!face || !nose) return;
        const chin = getXY(face[152]);
        const top = getXY(face[10]);
        const rY = Math.hypot(chin.x - top.x, chin.y - top.y) * 0.55;
        const cX = nose.x, cY = nose.y - rY * 0.05;

        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 4; // 增加線條厚度代替發光
        ctx.beginPath();
        ctx.arc(cX, cY, rY, 0, Math.PI * 2);
        ctx.stroke();
    }

    // 2. 菱形關節 (簡化版)
    function drawJoint(pt, size = 5) {
        if (!pt) return;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(pt.x, pt.y - size); ctx.lineTo(pt.x + size, pt.y);
        ctx.lineTo(pt.x, pt.y + size); ctx.lineTo(pt.x - size, pt.y);
        ctx.closePath(); ctx.stroke();
    }

    function Render(currentTime) {
        requestAnimationFrame(Render);

        // FPS 檢查
        if (currentTime - lastTime < interval) return;
        lastTime = currentTime;

        // 畫布尺寸同步
        if (canvas.width !== window.innerWidth) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // 繪製背景 (100% 全彩無濾鏡)
        ctx.save();
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        if (results) {
            const pose = results.poseLandmarks;
            const leftHand = results.leftHandLandmarks;
            const rightHand = results.rightHandLandmarks;

            if (pose) {
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 4;
                // 核心骨架連線
                const pairs = [[11,12],[11,13],[13,15],[12,14],[14,16],[23,24],[23,25],[25,27],[24,26],[26,28],[11,23],[12,24]];
                pairs.forEach(([i,j]) => {
                    const p1 = getXY(pose[i]), p2 = getXY(pose[j]);
                    if(p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                });
                
                // 關節與頭
                [11,12,13,14,15,16,23,24,25,26,27,28].forEach(i => drawJoint(getXY(pose[i])));
                drawHaloHead(results.faceLandmarks, getXY(pose[0]));
            }

            // 手指連線 (保留 21 節點)
            [leftHand, rightHand].forEach(hand => {
                if (hand) {
                    ctx.lineWidth = 1.5;
                    const hPairs = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
                    hPairs.forEach(([i,j]) => {
                        const p1 = getXY(hand[i]), p2 = getXY(hand[j]);
                        if(p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                    });
                }
            });
        }
    }

    const holistic = new Holistic({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}` });
    
    // 💡 行動裝置輕量化設定 (核心關鍵)
    holistic.setOptions({
        modelComplexity: 0,         // 強制 Lite 模型
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
        refineFaceLandmarks: false  // 關閉面部細節以求流暢
    });

    holistic.onResults(r => results = r);

    // 啟動低解析度相機 (手機順暢運算的基礎)
    const camera = new Camera(video, {
        onFrame: async () => await holistic.send({image: video}),
        width: 480,
        height: 360
    });
    
    camera.start();
    requestAnimationFrame(Render);
</script>
</body>
</html>
